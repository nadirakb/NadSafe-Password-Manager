services:
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: nadsafe-dev-server
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - vaultwarden-data:/data
    environment:
      # Allow registrations during development — lock down in production
      SIGNUPS_ALLOWED: "true"
      SIGNUPS_VERIFY: "false"

      # Admin panel — set a token to enable (disabled by default)
      # ADMIN_TOKEN: "changeme-set-a-real-value"

      # Dev: disable HTTPS requirement (we're on localhost)
      ROCKET_TLS: "{certs=\"\",key=\"\"}"

      # Log level
      LOG_LEVEL: "warn"
      EXTENDED_LOGGING: "false"

      # Domain (needed for correct CORS / cookies)
      DOMAIN: "http://localhost:8000"

      # Enable WebSocket for live sync
      WEBSOCKET_ENABLED: "true"

      # KDF floor — enforce Argon2id minimum in production
      # KDF_ALGORITHM: "1"  # 1 = Argon2id

volumes:
  vaultwarden-data:
