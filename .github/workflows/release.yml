name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"   # e.g. v1.0.0

permissions:
  contents: write  # needed to create GitHub Release + upload assets

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Build web assets (shared by Tauri) ────────────────────────────────────
  build-web:
    name: Build web UI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci --ignore-scripts
      - run: npm run build --workspace=clients/web

      # Upload built web assets for Tauri builds to consume
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: clients/web/dist/
          retention-days: 1

  # ── Desktop — Linux ───────────────────────────────────────────────────────
  desktop-linux:
    name: Desktop (Linux)
    runs-on: ubuntu-22.04
    needs: build-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install Tauri system deps
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev \
            patchelf

      - name: Download web dist
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: clients/desktop/dist/

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version '^2' --locked

      - name: Build Tauri app
        run: cargo tauri build
        working-directory: clients/desktop/src-tauri
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload Linux bundles
        uses: actions/upload-artifact@v4
        with:
          name: desktop-linux
          path: |
            clients/desktop/src-tauri/target/release/bundle/deb/*.deb
            clients/desktop/src-tauri/target/release/bundle/rpm/*.rpm
            clients/desktop/src-tauri/target/release/bundle/appimage/*.AppImage

  # ── Desktop — macOS ───────────────────────────────────────────────────────
  desktop-macos:
    name: Desktop (macOS)
    runs-on: macos-14  # Apple Silicon
    needs: build-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2

      - name: Download web dist
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: clients/desktop/dist/

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version '^2' --locked

      - name: Build Tauri app (universal binary)
        run: cargo tauri build --target universal-apple-darwin
        working-directory: clients/desktop/src-tauri
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS notarization — set these secrets in GitHub repo settings
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload macOS bundles
        uses: actions/upload-artifact@v4
        with:
          name: desktop-macos
          path: |
            clients/desktop/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg

  # ── Desktop — Windows ─────────────────────────────────────────────────────
  desktop-windows:
    name: Desktop (Windows)
    runs-on: windows-latest
    needs: build-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Download web dist
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: clients/desktop/dist/

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version '^2' --locked

      - name: Build Tauri app
        run: cargo tauri build
        working-directory: clients/desktop/src-tauri
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload Windows bundles
        uses: actions/upload-artifact@v4
        with:
          name: desktop-windows
          path: |
            clients/desktop/src-tauri/target/release/bundle/msi/*.msi
            clients/desktop/src-tauri/target/release/bundle/nsis/*.exe

  # ── Extension — build & package ───────────────────────────────────────────
  extension:
    name: Extension (Chrome + Firefox ZIP)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci --ignore-scripts
      - run: npm run build --workspace=clients/extension

      - name: Package for Chrome Web Store
        run: |
          cd clients/extension
          zip -r ../../nadsafe-extension-chrome.zip dist/
        shell: bash

      - name: Package for Firefox AMO
        run: |
          cd clients/extension
          # Firefox requires source code submission for AMO review
          zip -r ../../nadsafe-extension-firefox.zip dist/
        shell: bash

      - uses: actions/upload-artifact@v4
        with:
          name: extension
          path: |
            nadsafe-extension-chrome.zip
            nadsafe-extension-firefox.zip

  # ── GitHub Release ────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [desktop-linux, desktop-macos, desktop-windows, extension]
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets/
          merge-multiple: true

      - name: List release assets
        run: find release-assets/ -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: NadSafe ${{ github.ref_name }}
          draft: true   # review before publishing
          generate_release_notes: true
          files: release-assets/**/*
