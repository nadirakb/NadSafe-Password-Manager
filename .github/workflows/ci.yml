name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Crypto core ───────────────────────────────────────────────────────────
  crypto-core:
    name: Crypto core (test + clippy + fmt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2

      - name: fmt
        run: cargo fmt --check -p nadsafe-crypto-core

      - name: clippy
        run: cargo clippy -p nadsafe-crypto-core -- -D warnings

      - name: test (incl. Bitwarden conformance vectors)
        run: cargo test -p nadsafe-crypto-core

  # ── WASM build ────────────────────────────────────────────────────────────
  crypto-core-wasm:
    name: Crypto core (WASM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: build wasm
        run: wasm-pack build crates/crypto-core --target web --features wasm

  # ── Node — shared install step ────────────────────────────────────────────
  # Both web and extension use npm workspaces rooted at the repo root.
  # npm ci from root installs all workspace deps in one step.
  node-install:
    name: npm ci (workspace root)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install all workspace deps
        run: npm ci --ignore-scripts
      # Cache node_modules for downstream jobs
      - uses: actions/cache/save@v4
        with:
          path: |
            node_modules
            clients/web/node_modules
            clients/extension/node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}

  # ── Web UI ────────────────────────────────────────────────────────────────
  web:
    name: Web UI (typecheck + build)
    runs-on: ubuntu-latest
    needs: node-install
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            clients/web/node_modules
            clients/extension/node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}

      - name: lint
        run: npm run lint --workspace=clients/web

      - name: test
        run: npm run test --workspace=clients/web

      - name: typecheck
        run: npm run typecheck --workspace=clients/web

      - name: build
        run: npm run build --workspace=clients/web

  # ── Extension ─────────────────────────────────────────────────────────────
  extension:
    name: Extension (typecheck + build)
    runs-on: ubuntu-latest
    needs: node-install
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            clients/web/node_modules
            clients/extension/node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}

      - name: test
        run: npm run test --workspace=clients/extension

      - name: typecheck
        run: npm run typecheck --workspace=clients/extension

      - name: build
        run: npm run build --workspace=clients/extension

      # Verify manifest.json and icons copied to dist
      - name: verify extension dist
        run: |
          test -f clients/extension/dist/manifest.json
          test -f clients/extension/dist/icons/icon-128.png
          echo "Extension dist OK"

  # ── Desktop (check only — full Tauri build is in release.yml) ─────────────
  desktop-check:
    name: Desktop (cargo check + clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install Tauri system deps
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev

      - name: check
        run: cargo check -p nadsafe-desktop

      - name: clippy
        run: cargo clippy -p nadsafe-desktop -- -D warnings

  # ── Status gate ───────────────────────────────────────────────────────────
  # Single required status check for branch protection.
  ci:
    name: CI
    runs-on: ubuntu-latest
    needs: [crypto-core, crypto-core-wasm, web, extension, desktop-check]
    if: always()
    steps:
      - name: check all jobs
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "One or more CI jobs failed"
            exit 1
          fi
          echo "All CI jobs passed"
