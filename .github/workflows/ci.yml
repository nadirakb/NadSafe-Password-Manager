name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Crypto core ───────────────────────────────────────────
  crypto-core:
    name: Crypto core (test + clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2

      - name: fmt
        run: cargo fmt --check -p nadsafe-crypto-core

      - name: clippy
        run: cargo clippy -p nadsafe-crypto-core -- -D warnings

      - name: test
        run: cargo test -p nadsafe-crypto-core

  # ── WASM build ────────────────────────────────────────────
  crypto-core-wasm:
    name: Crypto core (WASM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: build wasm
        run: wasm-pack build crates/crypto-core --target web --features wasm

  # ── Web UI ────────────────────────────────────────────────
  web:
    name: Web UI (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clients/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: clients/web/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build

  # ── Extension ─────────────────────────────────────────────
  extension:
    name: Extension (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clients/extension
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: clients/extension/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build

  # ── Desktop (check only on CI — full build needs Tauri system deps) ──
  desktop-check:
    name: Desktop (cargo check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install Tauri system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev
      - name: check
        run: cargo check -p nadsafe-desktop
